# CourtListener -> Prediction Market Litigation Explorer  ·  ingestion
# -----------------------------------------------------------------------------
# Polls CourtListener daily for new Kalshi / Polymarket prediction-market
# dockets and AUTONOMOUSLY publishes them: it stages drafts, auto-approves them
# into models/pmle/data.js (verifiable docket metadata + honest pending/
# unreviewed defaults — never an invented legal fact), runs the validator, and
# commits straight to the default branch so Vercel redeploys the live Tracker.
# No human-approval gate (per owner's directive).
#
# Activation is opt-in: this file does nothing until (a) it is committed to the
# default branch and (b) the COURTLISTENER_API_TOKEN repo secret is set.
name: courtlistener-ingest

on:
  schedule:
    - cron: "17 */6 * * *"   # every 6h — catch new filings promptly; the status-refresh
                             # pass self-throttles to once/day (CourtListener rate limit)
  workflow_dispatch:
    inputs:
      days:
        description: "Look-back window in days"
        required: false
        default: "7"

permissions:
  contents: write

concurrency:
  group: courtlistener-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Ingest + auto-publish new dockets
        env:
          COURTLISTENER_API_TOKEN: ${{ secrets.COURTLISTENER_API_TOKEN }}
        run: |
          if [ -z "$COURTLISTENER_API_TOKEN" ]; then
            echo "::error::COURTLISTENER_API_TOKEN secret is not set — skipping."
            exit 1
          fi
          node scripts/ingest/ingest.js --backfill --days "${{ github.event.inputs.days || '7' }}" --auto

      - name: Commit + deploy if data changed
        run: |
          if git diff --quiet -- models/pmle/data.js data/ingest; then
            echo "No new cases. Nothing to deploy."
            exit 0
          fi
          git config user.email "noreply@anthropic.com"
          git config user.name  "courtlistener-ingest"
          git add models/pmle/data.js data/ingest
          n=$(git diff --cached --numstat -- models/pmle/data.js | awk '{print $1}')
          git commit -m "ingest: auto-publish new CourtListener case(s) to the live Tracker"
          # push to the branch this workflow ran on (the default/deploy branch)
          git push origin HEAD:"${GITHUB_REF_NAME}"
