# Wallet-forensics scheduled job
# -----------------------------------------------------------------------------
# Retrospective Polymarket wallet forensics on the static stack. Each tick
# advances the durable queue: enumerate a batch of RESOLVED markets, aggregate
# trades BY WALLET, cheap-screen, deep-enrich the stalest screened wallets, score
# with the unit-tested detector suite, and persist the flagged subjects to
# data/forensics/store.json (the read API the Wallet Forensics tab polls).
#
# Polymarket's public Gamma/Data/CLOB endpoints need no credentials, so no
# secret is required here. Each new flagged-subject commit triggers a Vercel
# deploy; the 15-min cadence stays well within the API rate limits.
name: forensics-scan

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: forensics-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    # Hard cap so one slow tick can't run for hours and back up the 15-min cron.
    # State persists, so a tick killed at the cap simply resumes next run.
    # TEMPORARY (Harvard calibration): 13→14 to fit the doubled MARKETS_PER_RUN; still < the
    # 15-min cron interval so runs don't overlap. Revert to 13 with MARKETS_PER_RUN.
    timeout-minutes: 14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # OFF-GIT POOL: the screened-wallet pool (data/forensics/state.json) is the big,
      # fast-changing working set. Committing it to git every tick both hit git's file-size
      # limit (capping the pool at ~6k) AND bloated history. Persist it in the Actions
      # cache instead — no size limit, no repo bloat. The unique `key` always misses (so it
      # SAVES the fresh pool at job end); `restore-keys` prefix-matches the most recent
      # prior cache (so it RESTORES last tick's pool). On a cold cache it falls back to the
      # committed state.json (one-time migration seed), then the cache takes over.
      - name: Restore forensic pool (off-git)
        uses: actions/cache@v4
        with:
          path: data/forensics/state.json
          key: forensics-pool-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            forensics-pool-

      - name: Advance the forensic ledger (enumerate → aggregate → screen → score)
        env:
          # Coverage: a full year of resolved markets, swept ~400 markets/tick so
          # the whole resolved universe is covered in well under a day. (Dune's
          # ~300k figure is ALL-TIME, ALL-market traders; this tool's scope is the
          # forensically-relevant set — wallets in RESOLVED markets over LOOKBACK.)
          # Budgets are tuned so ONE tick finishes in ~5–8 min — the every-15-min cron
          # must not back up (runs don't overlap). Coverage accumulates ACROSS ticks:
          # the catalog, screened pool and HLL all persist, so each run advances the
          # frontier rather than redoing the universe.
          LOOKBACK_DAYS: "365"
          # REBALANCED: enumeration of 450 markets + 12 live pages was eating the ENTIRE
          # wall-clock budget, so deep-enrich ran 0 wallets/tick (no records mature, no
          # funder data, no clusters). The catalog already holds 1,800+ resolved markets
          # and accumulates across ticks, so a smaller per-tick enumeration is plenty —
          # and frees most of the budget for ENRICHMENT, which is what actually flags
          # wallets and forms clusters.
          # TEMPORARY (Harvard calibration): doubled 120→240 to re-sweep the market universe
          # ~2× faster so the corrected Harvard cross-sectional inputs (hz) repopulate sooner
          # and the shadow distribution can be validated against the paper. Revert to 120 once
          # the Harvard cutover is calibrated + live.
          MARKETS_PER_RUN: "240"
          # Enrichment now runs CONCURRENTLY (ENRICH_CONCURRENCY wallets at once), so a
          # much larger batch fits the budget — coverage climbs ~5× faster per tick.
          ENRICH_BATCH: "700"
          ENRICH_CONCURRENCY: "5"
          SCREEN_USD: "2500"
          # Retain a large candidate pool (cheap): 790/800 screened wallets already had a
          # winning long-shot, so the old 800 cap evicted real candidates before their
          # full record (the multi-win pattern that flags) could resolve.
          # Pool cap. The git file-size limit no longer binds — state.json is now persisted
          # in the Actions cache (off-git), so the pool can scale to the full candidate
          # universe. Bounded now by per-tick parse/write time + memory of the JSON
          # (~7.5KB/wallet → 15k ≈ 112MB, comfortably within the runner's 7GB). Tune up
          # once stable; the cluster pass is funder-bucketed so it scales too.
          SCREEN_CAP: "15000"
          # Live-resolve un-cataloged markets so deep-enrich sees each wallet's WHOLE
          # record, not the thin slice the sweep has reached. Bounded to keep the tick fast.
          ONDEMAND_PER_RUN: "600"
          ONDEMAND_PER_WALLET: "70"
          # Live discovery feed: pages of the global recent-trades stream pulled each
          # tick — new wallets are observed the moment they trade, and any whose trade
          # lands in a resolved in-scope market is screened + front-of-queue enriched
          # immediately (near-real-time). Bumped now that enrichment is parallelized.
          LIVE_PAGES: "8"
          # Wall-clock budget for one tick (job hard-killed at timeout-minutes=14). ~11 min
          # of work leaves a safe margin for the commit+push.
          # TEMPORARY (Harvard calibration): 600→660 to match the doubled MARKETS_PER_RUN.
          SCAN_BUDGET_S: "660"
          # Auto ring-finder: walk the on-chain funding graph from the top N flagged
          # wallets each tick, pull in the siblings the sweep hasn't reached, and queue
          # them for scoring. Key-gated (needs eth_getLogs / tokentx, which the keyless
          # RPC can't do reliably). Bounded so the trace stays under the tick budget.
          RING_BUDGET: "12"
          # Materiality floor: a flagged wallet must have real money at risk
          # (max of total long-shot stake or |realized P/L|). Insider trading is about
          # money — a statistically-odd record on $20 bets is a gambler, not an insider.
          # Every confirmed case is $10k+; $1k keeps them all and clears the noise.
          MATERIALITY_USD: "1000"
          # Optional: a Polygonscan/Etherscan key gives reliable funding traces
          # (fresh-wallet, cluster funder, cash-out). Without it the job falls
          # back to the public Polygon RPC (POLYGON_RPC) and degrades honestly.
          POLYGONSCAN_API_KEY: ${{ secrets.POLYGONSCAN_API_KEY }}
          POLYGON_RPC: ${{ secrets.POLYGON_RPC }}
        run: node scripts/forensics/scan.js

      - name: Commit store + catalog if anything changed
        run: |
          # NOTE: state.json is NO LONGER committed — it lives in the Actions cache
          # (off-git). Only the small, Vercel-served outputs are committed: store.json
          # (read API), markets.json (winner catalog, must accumulate), rejected.json
          # (pre-publish gate log), harvard-shadow.json (dark-launch diagnostic).
          if git diff --quiet -- data/forensics/store.json data/forensics/markets.json data/forensics/rejected.json data/forensics/harvard-shadow.json; then
            echo "No change this tick."
            exit 0
          fi
          git config user.email "noreply@anthropic.com"
          git config user.name  "forensics-scan"
          git add data/forensics/store.json data/forensics/markets.json data/forensics/rejected.json data/forensics/harvard-shadow.json
          git commit -m "forensics: advance ledger (enumerate → aggregate → screen → score)"
          # Push with rebase+retry. When two ticks race, the regenerated JSON files
          # genuinely CONFLICT (each is a full rewrite, not a patch), so a plain
          # `pull --rebase` aborts mid-rebase and the next push silently reports
          # "up-to-date" — the tick's results are LOST. That is exactly why the
          # flagged set was frozen. Resolve deterministically with `-X theirs`
          # (during a rebase, "theirs" = OUR replayed commit), so this tick's fresh
          # snapshot always wins the conflict and actually lands.
          for i in 1 2 3 4 5; do
            if git push origin HEAD:"${GITHUB_REF_NAME}"; then echo "pushed"; exit 0; fi
            echo "push rejected (attempt $i) — rebasing -X theirs (our fresh snapshot wins) and retrying"
            git fetch origin "${GITHUB_REF_NAME}" || true
            if ! git rebase -X theirs "origin/${GITHUB_REF_NAME}"; then
              echo "rebase -X theirs failed; forcing our snapshot onto remote head"
              git rebase --abort 2>/dev/null || true
              git reset --soft "origin/${GITHUB_REF_NAME}" 2>/dev/null || true
              git checkout --ours -- data/forensics/store.json data/forensics/markets.json data/forensics/rejected.json data/forensics/harvard-shadow.json 2>/dev/null || true
              git add data/forensics/store.json data/forensics/markets.json data/forensics/rejected.json data/forensics/harvard-shadow.json
              git commit -m "forensics: advance ledger (enumerate → aggregate → screen → score)" || true
            fi
            sleep $((i * 3))
          done
          echo "push still failing after retries" >&2
          exit 1
