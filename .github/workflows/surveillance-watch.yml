# Background surveillance watcher
# -----------------------------------------------------------------------------
# Pulls the live surveillance feed on a schedule and appends new flags to a
# rolling history (data/surveillance/history.json), so anomalies are recorded
# even when no one has the model open. It calls the site's own public endpoint
# — which already holds the Kalshi key server-side — so no secret is needed here.
#
# Each new-flag commit triggers a Vercel deploy; the 30-min cadence keeps that
# modest. Tune the cron below (or switch to Vercel KV) for higher frequency.
name: surveillance-watch

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: surveillance-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Pull both engines + advance the rolling-coverage queue
        run: |
          # Enumerate-light each tick: pull the insider AND manipulation feeds
          # (the endpoint holds the Kalshi key + rotates the deep-enrich batch).
          curl -fsS --max-time 40 "https://www.michael-gertsik.com/api/surveillance/feed?mode=insider" -o feed-insider.json \
            || echo '{"engine":"insider","markets":[],"alerts":[]}' > feed-insider.json
          curl -fsS --max-time 40 "https://www.michael-gertsik.com/api/surveillance/feed?mode=manipulation" -o feed-manipulation.json \
            || echo '{"engine":"manipulation","markets":[],"alerts":[]}' > feed-manipulation.json
          # Upsert into the durable queue, run lifecycle, assert the staleness
          # invariant, and append flagged alerts to the rolling history.
          node scripts/surveillance/scan.js feed-insider.json feed-manipulation.json

      - name: Commit store + history if anything changed
        run: |
          if git diff --quiet -- data/surveillance/store.json data/surveillance/history.json; then
            echo "No change this tick."
            exit 0
          fi
          git config user.email "noreply@anthropic.com"
          git config user.name  "surveillance-watch"
          git add data/surveillance/store.json data/surveillance/history.json
          git commit -m "surveillance: advance rolling-coverage queue + history"
          git push origin HEAD:"${GITHUB_REF_NAME}"
